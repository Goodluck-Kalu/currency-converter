<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        max-width: 400px;
        margin: 50px auto;
        padding: 20px;
        background: #f5f5f5;
    }

    h1 {
        color: #333;
    }

    input, select, button {
        display: block;
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        background: #6200ea;
        color: white;
        cursor: pointer;
        border: none;
    }

    button:hover {
        background: #3700b3;
    }

    #result {
        font-size: 20px;
        font-weight: bold;
        color: #6200ea;
        margin-top: 20px;
    }
</style>
</head>
<body>
    <h1>Currency Converter</h1>
    <input type="number" id="amount" placeholder="Enter amount in naira">
    
    <select name="currency" id="currency">
        <option value="USD">Dollar</option>
        <option value="EUR">Euro</option>
        <option value="GBP">Pound</option>
        
    </select>

    <button id="convertBtn">Convert</button>
    <p id="result"></p>

    <script src="changeAPI.js"></script>
</body>
</html>
